<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Green Kiosk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Apple SD Gothic Neo', sans-serif; }
        
        /* [배경 설정] 보내주신 1000041093.jpg 이미지를 여기에 넣으세요 */
        #background-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('1000041093.jpg'); /* 파일명이 다르면 수정해주세요 */
            background-size: cover;
            background-position: center bottom;
            z-index: -2;
            transition: filter 2s ease-in-out;
        }

        /* 탄소 배출 시 안개/매연이 끼는 효과 */
        #smog-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(50, 50, 50, 0);
            z-index: -1;
            pointer-events: none;
            transition: background 2s ease-in-out;
        }

        .polluted-bg { filter: saturate(0.3) brightness(0.7) blur(2px); }
        .polluted-smog { background: rgba(80, 80, 80, 0.4) !important; }

        /* UI 요소: 투명하고 깔끔하게 */
        .glass-ui {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
        }

        select, button {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <!-- 배경 레이어 -->
    <div id="background-container"></div>
    <div id="smog-layer"></div>

    <!-- 메인 대시보드 (제목 제거) -->
    <div class="w-full max-w-3xl space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 사진 업로드 카드 -->
            <div class="glass-ui p-8 text-center text-white">
                <div class="mb-4 text-4xl">📷</div>
                <input type="file" id="kioskInput" class="hidden" accept="image/*" onchange="onImageUpload(event)">
                <button onclick="document.getElementById('kioskInput').click()" class="bg-white/30 hover:bg-white/50 px-6 py-2 rounded-full text-sm font-medium">
                    키오스크 사진 촬영
                </button>
                <div id="status" class="mt-3 text-xs opacity-70">화면을 촬영하면 메뉴를 인식합니다</div>
            </div>

            <!-- 메뉴 비교 카드 -->
            <div class="glass-ui p-8 text-white">
                <div class="space-y-4">
                    <select id="menuA" class="w-full bg-white/20 border-none rounded-xl p-3 text-white focus:outline-none appearance-none">
                        <option value="" disabled selected>메뉴 A</option>
                    </select>
                    <div class="text-center opacity-40">VS</div>
                    <select id="menuB" class="w-full bg-white/20 border-none rounded-xl p-3 text-white focus:outline-none appearance-none">
                        <option value="" disabled selected>메뉴 B</option>
                    </select>
                    <button onclick="runComparison()" class="w-full bg-green-500/80 hover:bg-green-600 py-3 rounded-xl font-bold mt-4 shadow-lg">
                        비교하기
                    </button>
                </div>
            </div>
        </div>

        <!-- 결과 알림창 (기본 숨김) -->
        <div id="resultBox" class="glass-ui p-10 text-center text-white hidden">
            <div id="resultText" class="text-2xl font-light mb-2"></div>
            <div id="savingText" class="text-4xl font-bold mb-4"></div>
            <div id="rewardText" class="text-sm opacity-80 bg-white/10 py-2 rounded-full"></div>
            <button onclick="location.reload()" class="mt-6 text-xs underline opacity-50">다시 하기</button>
        </div>
    </div>

    <script>
        // 1. 인식 시뮬레이션 (1번 조원 파트)
        function onImageUpload(event) {
            document.getElementById('status').innerText = "분석 중...";
            setTimeout(() => {
                const menus = ["소고기 버거 세트", "콩고기 스테이크", "치즈 파스타", "샐러드 보울"];
                const selects = [document.getElementById('menuA'), document.getElementById('menuB')];
                
                selects.forEach(s => {
                    s.innerHTML = "";
                    menus.forEach(m => {
                        let op = document.createElement('option');
                        op.value = m; op.text = m; op.className = "text-black";
                        s.appendChild(op);
                    });
                });
                document.getElementById('status').innerText = "메뉴가 로드되었습니다";
            }, 1000);
        }

        // 2. 계산 및 배경 변화 (2번, 4번 파트)
        function runComparison() {
            const menuA = document.getElementById('menuA').value;
            const menuB = document.getElementById('menuB').value;
            if(!menuA || !menuB) return;

            const carbonMap = { "소고기 버거 세트": 12.0, "콩고기 스테이크": 2.5, "치즈 파스타": 4.5, "샐러드 보울": 1.2 };
            
            const diff = (carbonMap[menuA] - carbonMap[menuB]).toFixed(1);
            const isGood = diff > 0;

            // 결과창 표시
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('resultText').innerText = isGood ? "당신의 선택으로 아낀 탄소" : "선택하신 메뉴의 탄소량";
            document.getElementById('savingText').innerText = `${Math.abs(diff)}kg`;
            document.getElementById('rewardText').innerText = isGood ? `🎉 환경 기여 리워드 ${Math.abs(diff)*100}P 적립` : "더 나은 선택을 고민해볼까요?";

            // 배경 효과 (이게 핵심!)
            const bg = document.getElementById('background-container');
            const smog = document.getElementById('smog-layer');

            if (!isGood) {
                bg.classList.add('polluted-bg');
                smog.classList.add('polluted-smog');
            } else {
                bg.classList.remove('polluted-bg');
                smog.classList.remove('polluted-smog');
            }
        }
    </script>
</body>
</html>
