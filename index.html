<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그린 키오스크 - 메뉴 비교 엔진</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow-x: hidden; }
        
        /* [배경 설정] 애니메이션 효과를 위해 transition 추가 */
        #dynamic-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 70%, #8FBC8F 100%);
            z-index: -1;
            transition: all 1.5s ease;
        }

        /* [마을 아이콘] 하단에 고정 */
        .village {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 60px;
            z-index: -1;
            opacity: 0.8;
        }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* 탄소 배출량이 높을 때의 하늘 상태 (회색조) */
        .polluted {
            filter: grayscale(80%) brightness(0.6);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- 동적 배경 및 마을 -->
    <div id="dynamic-bg"></div>
    <div class="village">🏡🏘️🌳🚲</div>

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-green-900">🍔 그린 키오스크 엔진</h1>
            <p class="text-gray-700 font-medium">메뉴를 비교하고 하늘을 지켜주세요!</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- 왼쪽: 키오스크 인식 섹션 -->
            <div class="glass p-6 rounded-3xl shadow-xl">
                <h2 class="text-xl font-semibold mb-4 text-green-800">1. 키오스크 사진 분석</h2>
                <div class="border-2 border-dashed border-green-300 rounded-2xl p-6 text-center cursor-pointer hover:bg-green-50 transition" onclick="document.getElementById('kioskInput').click()">
                    <input type="file" id="kioskInput" class="hidden" accept="image/*" onchange="processKioskImage(event)">
                    <p class="text-gray-500">📸 키오스크 화면 촬영/업로드</p>
                </div>
                <div id="status" class="mt-4 text-sm font-bold text-blue-600 text-center"></div>
            </div>

            <!-- 오른쪽: 메뉴 비교 섹션 -->
            <div class="glass p-6 rounded-3xl shadow-xl">
                <h2 class="text-xl font-semibold mb-4 text-green-800">2. 메뉴 비교하기</h2>
                <div class="space-y-4">
                    <select id="menuA" class="w-full p-3 rounded-xl border focus:ring-2 focus:ring-green-500"></select>
                    <div class="text-center font-bold text-gray-400 text-xl">VS</div>
                    <select id="menuB" class="w-full p-3 rounded-xl border focus:ring-2 focus:ring-green-500"></select>
                    
                    <button onclick="compareMenus()" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl hover:bg-green-700 shadow-lg transition">
                        환경 영향도 비교하기
                    </button>
                </div>
            </div>
        </div>

        <!-- 결과 표시창 -->
        <div id="resultCard" class="glass mt-8 p-8 rounded-3xl shadow-2xl hidden text-center">
            <h3 class="text-2xl font-bold mb-2 text-gray-800" id="resultText"></h3>
            <p class="text-lg text-gray-600" id="savingInfo"></p>
            <div class="mt-4 text-green-600 font-bold" id="rewardPoint"></div>
        </div>
    </div>

    <script>
        /* --- [1번 조원: 키오스크 인식 파트] --- */
        function processKioskImage(event) {
            const status = document.getElementById('status');
            status.innerText = "🔍 메뉴를 분석하고 있습니다...";
            
            // 시뮬레이션: 실제로는 조원의 OCR 코드가 리스트를 반환함
            setTimeout(() => {
                const detectedMenus = ["소고기 패티 버거", "두부 패티 버거", "치즈 스틱", "샐러드 팩"];
                updateSelectBoxes(detectedMenus);
                status.innerText = "✅ 분석 완료! 메뉴를 선택해 주세요.";
            }, 1500);
        }

        function updateSelectBoxes(menus) {
            const selectA = document.getElementById('menuA');
            const selectB = document.getElementById('menuB');
            [selectA, selectB].forEach(select => {
                select.innerHTML = "";
                menus.forEach(menu => {
                    let opt = document.createElement('option');
                    opt.value = menu;
                    opt.innerHTML = menu;
                    select.appendChild(opt);
                });
            });
        }

        /* --- [2번 조원: 탄소 계산 파트] --- */
        function getCarbonValue(menuName) {
            const carbonData = {
                "소고기 패티 버거": 15.5,
                "두부 패티 버거": 2.1,
                "치즈 스틱": 1.5,
                "샐러드 팩": 0.8
            };
            return carbonData[menuName] || 1.0;
        }

        /* --- [4번 조원: 프론트엔드 연결 및 시각화] --- */
        function compareMenus() {
            const menuA = document.getElementById('menuA').value;
            const menuB = document.getElementById('menuB').value;
            const bg = document.getElementById('dynamic-bg');
            const resultCard = document.getElementById('resultCard');

            const scoreA = getCarbonValue(menuA);
            const scoreB = getCarbonValue(menuB);
            const difference = (scoreA - scoreB).toFixed(1);

            resultCard.classList.remove('hidden');

            if (scoreA > scoreB) {
                // 더 친환경적인 선택을 한 경우 (하늘 맑음)
                bg.classList.remove('polluted');
                document.getElementById('resultText').innerText = `🌿 ${menuB}가 더 탁월한 선택입니다!`;
                document.getElementById('savingInfo').innerText = `${menuA}보다 탄소 배출량을 ${difference}kg 줄일 수 있습니다.`;
                document.getElementById('rewardPoint').innerText = `💰 그린 포인트 ${Math.abs(difference * 100)}P 적립 예정`;
            } else {
                // 탄소 배출량이 더 많은 선택을 한 경우 (하늘 탁해짐)
                bg.classList.add('polluted');
                document.getElementById('resultText').innerText = `⚠️ 환경 영향도가 높아집니다.`;
                document.getElementById('savingInfo').innerText = `${menuB}는 탄소 배출량이 상대적으로 많습니다.`;
                document.getElementById('rewardPoint').innerText = `다른 대안을 찾아보는 건 어떨까요?`;
            }
        }
    </script>
</body>
</html>
