<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Kiosk Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Apple SD Gothic Neo', sans-serif; overflow: hidden; }
        
        /* 배경 설정 */
        #bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('1000041093.jpg'); 
            background-size: cover; background-position: center;
            z-index: -2; transition: all 1s ease;
        }

        /* 글래스모피즘 UI */
        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
        }

        .polluted { filter: grayscale(0.8) brightness(0.3) !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="bg-container"></div>

    <!-- [STEP 1] 사진 업로드 섹션 -->
    <div id="step-upload" class="glass p-8 text-center text-white w-full max-w-sm">
        <div class="text-5xl mb-4">📷</div>
        <p class="mb-6 opacity-80">키오스크 메뉴판을 촬영해주세요</p>
        <input type="file" id="photo-input" class="hidden" accept="image/*">
        <button onclick="document.getElementById('photo-input').click()" class="bg-white text-green-600 px-6 py-3 rounded-full font-bold shadow-lg">
            사진 선택하기
        </button>
        <button onclick="uploadToBackend()" id="submit-btn" class="hidden mt-4 w-full bg-green-500 py-2 rounded-xl font-bold">
            분석 시작하기
        </button>
    </div>

    <!-- [STEP 2] 분석 중 로딩 섹션 -->
    <div id="step-loading" class="hidden glass p-10 text-center text-white">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-white mx-auto mb-4"></div>
        <p class="italic">백엔드 서버에서 메뉴 분석 중...</p>
    </div>

    <!-- [STEP 3] 결과 및 비교 섹션 -->
    <div id="step-result" class="hidden w-full max-w-lg space-y-4">
        <div class="glass p-6 grid grid-cols-2 gap-4">
            <select id="menuA" class="bg-white/20 p-3 rounded-xl text-white outline-none">
                <option value="" class="text-black">메뉴 A</option>
            </select>
            <select id="menuB" class="bg-white/20 p-3 rounded-xl text-white outline-none">
                <option value="" class="text-black">메뉴 B</option>
            </select>
            <button onclick="showComparison()" class="col-span-2 bg-green-500 py-4 rounded-2xl text-white font-bold">탄소 발자국 비교</button>
        </div>

        <div id="compare-cards" class="hidden grid grid-cols-2 gap-4">
            <div id="cardA" onclick="checkImpact('A')" class="glass p-5 text-center text-white cursor-pointer hover:scale-105 transition">
                <p id="labelA" class="text-xs opacity-70"></p>
                <p id="valA" class="text-2xl font-bold"></p>
            </div>
            <div id="cardB" onclick="checkImpact('B')" class="glass p-5 text-center text-white cursor-pointer hover:scale-105 transition">
                <p id="labelB" class="text-xs opacity-70"></p>
                <p id="valB" class="text-2xl font-bold"></p>
            </div>
        </div>
    </div>

    <script>
        // 백엔드 팀원이 줄 데이터 구조 (예시)
        let carbonData = {}; 
        let currentScores = { A: 0, B: 0 };

        // 1. 사진 선택 시 버튼 노출
        document.getElementById('photo-input').onchange = function() {
            document.getElementById('submit-btn').classList.remove('hidden');
        };

        // 2. 백엔드로 데이터 전송 (연동 핵심)
        async function uploadToBackend() {
            // 화면 전환
            document.getElementById('step-upload').classList.add('hidden');
            document.getElementById('step-loading').classList.remove('hidden');

            // 실제 백엔드 연동 시 fetch 사용
            // const formData = new FormData();
            // formData.append('image', document.getElementById('photo-input').files[0]);
            // const response = await fetch('/analyze', { method: 'POST', body: formData });
            // const result = await response.json();

            // [가상 테스트용] 2초 후 분석 완료 가정
            setTimeout(() => {
                carbonData = { "소고기 버거": 15.2, "대체육 버거": 2.1, "치즈 스틱": 3.5, "샐러드": 1.2 };
                const selects = [document.getElementById('menuA'), document.getElementById('menuB')];
                
                selects.forEach(select => {
                    Object.keys(carbonData).forEach(menu => {
                        let opt = document.createElement('option');
                        opt.value = menu; opt.text = menu; opt.className = "text-black";
                        select.add(opt);
                    });
                });

                document.getElementById('step-loading').classList.add('hidden');
                document.getElementById('step-result').classList.remove('hidden');
            }, 2000);
        }

        // 3. 메뉴 비교 및 출력
        function showComparison() {
            const mA = document.getElementById('menuA').value;
            const mB = document.getElementById('menuB').value;
            if(!mA || !mB) return;

            currentScores.A = carbonData[mA];
            currentScores.B = carbonData[mB];

            document.getElementById('compare-cards').classList.remove('hidden');
            document.getElementById('labelA').innerText = mA;
            document.getElementById('valA').innerText = currentScores.A + "kg";
            document.getElementById('labelB').innerText = mB;
            document.getElementById('valB').innerText = currentScores.B + "kg";
        }

        // 4. 카드 클릭 시 배경 변화 (JS 로직)
        function checkImpact(type) {
            const score = currentScores[type];
            const bg = document.getElementById('bg-container');
            
            if(score >= 5.0) {
                bg.classList.add('polluted');
            } else {
                bg.classList.remove('polluted');
            }
        }
    </script>
</body>
</html>
